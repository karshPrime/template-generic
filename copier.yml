
_min_copier_version: "9.10.0"
_subdirectory: template
_answers_file: .copier-python-project/.copier-{{ project_language }}-answers.yml

#===============================================================================
# Bench Calculations

# langauge .extension
project_language:
  type: str
  default: >-
    {{
      _folder_name.rsplit('.', 1)[1]
      if '.' in _folder_name
      else 'xx'
    }}
  when: false

# langauge raw name
project_name_raw:
  type: str
  default: >-
    {{
      _folder_name.rsplit('.', 1)[0]
      if '.' in _folder_name
      else _folder_name
    }}
  when: false


#===============================================================================
# Interactive

# optional project description
project_description:
  type: str
  qmark: "\n >"
  help: "Project Description:"
  placeholder: "\"\""
  default: ""
  when: >-
    {{ not (
         project_name_raw.startswith('bench')
         and project_name_raw[5:].isdigit()
       ) }}


#===============================================================================
# Deaults
# Saved in ~/.config/copier/settings.yml

author_name:
  when: false

author_email:
  when: false

github_user:
  when: false


#===============================================================================
# Auto-generate

# Capitalised Project Name
project_name:
  default: >-
    {{
      project_name_raw
      | trim
      | title
    }}
  when: false

# kebab-case-project-name
project_slug:
  type: str
  default: >-
    {{
      project_name_raw
      | lower
      | trim
      | regex_replace('[^a-z0-9]+', '-')
      | regex_replace('-+', '-')
      | trim('-')
    }}
  when: false

# snake_case_module_name
module_slug:
  type: str
  default: >-
    {{ project_slug | regex_replace('-', '_') }}
  when: false

# current year for licenses
year:
  type: int
  default: "{{ '%Y' | strftime }}"
  when: false

